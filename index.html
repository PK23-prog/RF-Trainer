<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Raid Trainer">
    <title>Raid Fire Trainer Pro</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJpY29ucyI6IFt7ICJzcmMiOiAiaWNvbi5wbmciLCAic2l6ZXMiOiAiMTkyeDE5MiIsICJ0eXBlIjogImltYWdlL3BuZyIgfV0sCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgInN0YXJ0X3VybCI6ICIuL2luZGV4Lmh0bWwiCn0=">

    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            touch-action: manipulation;
        }
        .container { 
            text-align: center; 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 400px; 
        }
        h1 { margin-bottom: 25px; color: #00d4ff; font-size: 1.5rem; text-transform: uppercase; }
        .button-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        button { 
            padding: 20px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 15px; 
            color: white; 
            font-weight: bold; 
            transition: transform 0.1s; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn-8s { background: linear-gradient(135deg, #007bff, #0056b3); }
        .btn-6s { background: linear-gradient(135deg, #fd7e14, #ff922b); }
        .btn-4s { background: linear-gradient(135deg, #dc3545, #bd2130); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444 !important; color: #888; opacity: 0.6; }
        .volume-control { margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
        input[type=range] { width: 100%; margin: 15px 0; accent-color: #00d4ff; }
        #status { margin-top: 20px; color: #ffcc00; font-weight: bold; min-height: 1.2em; }
        .info { font-size: 0.7rem; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Shooting Timer</h1>
    <div class="button-grid">
        <button class="btn-8s" onclick="runSequence('8 Sek', [0, 3, 10, 12.6, 13.9, 15.2, 16.5, 17.8, 19.1])">8s Rapid Fire</button>
        <button class="btn-6s" onclick="runSequence('6 Sek', [0, 3, 10, 12, 12.98, 13.96, 14.94, 15.92, 16.9])">6s Rapid Fire</button>
        <button class="btn-4s" onclick="runSequence('4 Sek', [0, 3, 10, 11.5, 12.1, 12.7, 13.3, 13.9, 14.5])">4s Rapid Fire</button>
    </div>

    <div class="volume-control">
        <label>Lautstärke: <span id="volValue">50</span>%</label><br>
        <input type="range" id="volume" min="0" max="100" value="50" oninput="document.getElementById('volValue').innerText=this.value">
    </div>
    <div id="status">Bereit</div>
    <div class="info" id="wl-status">Offline-Modus: Aktiviert</div>
</div>

<script>
    // --- SERVICE WORKER REGISTRIERUNG ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registriert'))
                .catch(err => console.error('SW Fehler:', err));
        });
    }

    // --- LOGIK ---
    let audioCtx = null;
    let wakeLock = null;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wl-status').innerText = "Bildschirm-Schutz: AKTIV";
                document.getElementById('wl-status').style.color = "#00ff00";
            } catch (err) { console.log("WakeLock Error"); }
        }
    }

    function playSound(ctx, time, freq, duration, type = 'square') {
        const vol = (document.getElementById('volume').value / 100) * 0.3;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + duration);
    }

    async function runSequence(name, intervals) {
        await requestWakeLock();
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const buttons = document.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        document.getElementById('status').innerText = name + " läuft...";

        const now = audioCtx.currentTime;
        intervals.forEach((delay, index) => {
            const hitTime = now + delay;
            if (index === 0) playSound(audioCtx, hitTime, 200, 0.5, 'triangle');
            else if (index === 1) {
                playSound(audioCtx, hitTime, 880, 0.1);
                playSound(audioCtx, hitTime + 0.15, 880, 0.1);
            }
            else if (index === 2) playSound(audioCtx, hitTime, 440, 0.2); 
            else playSound(audioCtx, hitTime, 880, 0.15);
        });

        setTimeout(() => {
            buttons.forEach(b => b.disabled = false);
            document.getElementById('status').innerText = "Bereit";
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
                document.getElementById('wl-status').innerText = "Offline-Modus: Aktiviert";
                document.getElementById('wl-status').style.color = "#666";
            }
        }, intervals[intervals.length - 1] * 1000 + 500);
    }
</script>
</body>
</html>
